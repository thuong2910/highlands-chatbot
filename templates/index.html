<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Highlands Coffee – Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #1a6b3a;
      --green-mid:    #2d8a50;
      --green-light:  #e8f5ec;
      --green-dark:   #0f3d20;
      --brown:        #6b3a1f;
      --brown-light:  #f5ede6;
      --cream:        #fdf9f5;
      --white:        #ffffff;
      --gray-50:      #f9fafb;
      --gray-100:     #f3f4f6;
      --gray-200:     #e5e7eb;
      --gray-400:     #9ca3af;
      --gray-500:     #6b7280;
      --gray-700:     #374151;
      --gray-900:     #111827;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.07);
      --shadow-md:    0 4px 16px rgba(0,0,0,.10);
      --shadow-lg:    0 8px 40px rgba(0,0,0,.18);
      --radius:       18px;
      --radius-sm:    10px;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: linear-gradient(160deg, var(--green-dark) 0%, var(--green) 50%, #3aaa65 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }

    /* ══ Wrapper ══ */
    .chat-wrapper {
      width: 100%; max-width: 470px;
      height: 92vh; max-height: 800px;
      display: flex; flex-direction: column;
      background: var(--cream);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.12);
    }

    /* ══ Header ══ */
    .chat-header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 60%, var(--green-mid) 100%);
      padding: 18px 20px 14px;
      display: flex; align-items: center; gap: 13px;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .chat-header::before {
      content: ''; position: absolute;
      right: -30px; top: -30px;
      width: 130px; height: 130px;
      background: rgba(255,255,255,.07); border-radius: 50%;
    }
    .chat-header::after {
      content: ''; position: absolute;
      right: 40px; bottom: -40px;
      width: 90px; height: 90px;
      background: rgba(255,255,255,.04); border-radius: 50%;
    }
    .avatar {
      width: 46px; height: 46px;
      background: var(--white); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      position: relative; z-index: 1;
    }
    .header-info { flex: 1; position: relative; z-index: 1; }
    .header-info h1 { font-size: 15.5px; font-weight: 700; color: var(--white); }
    .header-status {
      font-size: 11.5px; color: rgba(255,255,255,.75);
      display: flex; align-items: center; gap: 5px; margin-top: 2px;
    }
    .status-dot {
      width: 7px; height: 7px; background: #4ade80;
      border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(1.4); }
    }
    .header-actions { display: flex; gap: 6px; position: relative; z-index: 1; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 10px;
      background: rgba(255,255,255,.15); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: background .2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.25); }

    /* ══ Quick chips ══ */
    .quick-bar {
      background: var(--white);
      padding: 10px 14px;
      display: flex; gap: 7px; overflow-x: auto;
      border-bottom: 1px solid var(--gray-100);
      flex-shrink: 0;
    }
    .quick-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      background: var(--green-light); color: var(--green);
      border: 1.5px solid rgba(26,107,58,.18);
      border-radius: 20px; padding: 5px 13px;
      font-size: 11.5px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .chip:hover { background: var(--green); color: var(--white); transform: translateY(-1px); }

    /* ══ Messages ══ */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 18px 14px; display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

    /* Date divider */
    .date-divider {
      text-align: center; font-size: 11px; color: var(--gray-400);
      display: flex; align-items: center; gap: 8px; margin: 4px 0;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--gray-200);
    }

    /* Message row */
    .msg-row {
      display: flex; gap: 8px; align-items: flex-end;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-av {
      width: 28px; height: 28px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg-row.bot  .msg-av { background: var(--green-light); }
    .msg-row.user .msg-av { background: var(--brown-light); }

    .msg-col { display: flex; flex-direction: column; gap: 3px; max-width: 80%; }
    .msg-row.user .msg-col { align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      font-size: 13px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-row.bot .bubble {
      background: var(--white); color: var(--gray-700);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,.05);
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%);
      color: var(--white);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
    }
    .msg-time { font-size: 10px; color: var(--gray-400); padding: 0 4px; }

    /* Typing */
    .typing-row { display: flex; gap: 8px; align-items: flex-end; }
    .typing-bub {
      background: var(--white); padding: 12px 16px;
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      display: flex; gap: 5px; align-items: center;
      box-shadow: var(--shadow-sm);
    }
    .typing-bub span {
      width: 7px; height: 7px; background: var(--gray-400);
      border-radius: 50%; animation: bob .9s infinite;
    }
    .typing-bub span:nth-child(2) { animation-delay: .15s; }
    .typing-bub span:nth-child(3) { animation-delay: .3s; }
    @keyframes bob {
      0%,60%,100% { transform:translateY(0); background:var(--gray-400); }
      30%          { transform:translateY(-6px); background:var(--green-mid); }
    }

    /* ══ Input area ══ */
    .input-area {
      background: var(--white); border-top: 1px solid var(--gray-100);
      padding: 12px 14px; display: flex; gap: 9px; align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm); padding: 9px 13px;
      font-size: 13px; font-family: inherit; resize: none; outline: none;
      max-height: 96px; line-height: 1.55; color: var(--gray-700);
      background: var(--gray-50); transition: border-color .2s, background .2s;
    }
    #user-input:focus { border-color: var(--green-mid); background: var(--white); }
    #user-input::placeholder { color: var(--gray-400); }

    #send-btn {
      width: 40px; height: 40px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%);
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, opacity .15s;
    }
    #send-btn:hover  { transform: scale(1.06); }
    #send-btn:active { transform: scale(.93); opacity: .85; }
    #send-btn svg { width: 17px; height: 17px; fill: var(--white); }

    .footer-note {
      text-align: center; font-size: 10.5px; color: var(--gray-400);
      padding: 5px 14px 9px; background: var(--white);
    }

    /* ══ Toast ══ */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--gray-900); color: var(--white);
      padding: 8px 18px; border-radius: 20px; font-size: 12px;
      opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">☕</div>
    <div class="header-info">
      <h1>Highlands Coffee</h1>
      <div class="header-status"><span class="status-dot"></span> Trợ lý đang hoạt động</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()" title="Xóa lịch sử">🗑️</button>
      <button class="icon-btn" onclick="toggleSound()" id="sound-btn" title="Âm thanh">🔔</button>
    </div>
  </div>

  <!-- Quick chips -->
  <div class="quick-bar" id="quick-bar"></div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages">
    <div class="date-divider" id="date-div"></div>
    <div class="msg-row bot">
      <div class="msg-av">☕</div>
      <div class="msg-col">
        <div class="bubble">Xin chào! Mình là trợ lý của <strong>Highlands Coffee</strong> 🌿<br><br>Mình có thể giúp bạn tra cứu <strong>giá đồ uống, thành phần, gợi ý món uống</strong> và thông tin cửa hàng. Bạn muốn hỏi gì nào?</div>
        <span class="msg-time" id="welcome-time"></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="Nhập câu hỏi của bạn..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-note">Highlands Coffee Chatbot · Hỗ trợ thông tin đồ uống</div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────
  let soundOn = true;
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── Init ──────────────────────────────────────────────────
  document.getElementById('welcome-time').textContent = getTime();
  document.getElementById('date-div').textContent = getDate();
  loadChips();

  // ── Helpers ───────────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  }
  function getDate() {
    return new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' });
  }
  function scrollBottom() {
    const el = document.getElementById('chat-messages');
    el.scrollTop = el.scrollHeight;
  }

  // ── Âm thanh beep nhỏ ────────────────────────────────────
  function beep(freq = 880, dur = 80) {
    if (!soundOn) return;
    try {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur / 1000);
      osc.start(); osc.stop(audioCtx.currentTime + dur / 1000);
    } catch {}
  }

  function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('sound-btn').textContent = soundOn ? '🔔' : '🔕';
    showToast(soundOn ? 'Đã bật âm thanh' : 'Đã tắt âm thanh');
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Load quick chips từ server ────────────────────────────
  async function loadChips() {
    try {
      const res  = await fetch('/suggestions');
      const data = await res.json();
      const bar  = document.getElementById('quick-bar');
      data.suggestions.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = s;
        btn.onclick = () => sendQuick(s);
        bar.appendChild(btn);
      });
    } catch {}
  }

  // ── Thêm tin nhắn ─────────────────────────────────────────
  function appendMsg(text, role) {
    const messages = document.getElementById('chat-messages');
    const row  = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = role === 'bot' ? ;

    const col    = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time   = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = getTime();

    col.appendChild(bubble);
    col.appendChild(time);
    row.appendChild(av);
    row.appendChild(col);
    messages.appendChild(row);
    scrollBottom();
  }

  // ── Typing indicator ──────────────────────────────────────
  function showTyping() {
    const messages = document.getElementById('chat-messages');
    const row = document.createElement('div');
    row.className = 'typing-row'; row.id = 'typing';
    row.innerHTML = `
      <div class="msg-av" style="background:var(--green-light)">☕</div>
      <div class="typing-bub"><span></span><span></span><span></span></div>`;
    messages.appendChild(row);
    scrollBottom();
  }
  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ── Gửi tin nhắn ─────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const msg   = input.value.trim();
    if (!msg) return;

    beep(660, 60);
    appendMsg(msg, 'user');
    input.value = ''; input.style.height = 'auto';
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      hideTyping();
      // Delay nhỏ cho tự nhiên hơn
      setTimeout(() => {
        beep(880, 80);
        appendMsg(data.response, 'bot');
      }, 300);
    } catch {
      hideTyping();
      appendMsg('Xin lỗi, có lỗi xảy ra. Vui lòng thử lại! ', 'bot');
    }
  }

  function sendQuick(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  // ── Xóa lịch sử chat ─────────────────────────────────────
  function clearChat() {
    const messages = document.getElementById('chat-messages');
    messages.innerHTML = `
      <div class="date-divider">${getDate()}</div>
      <div class="msg-row bot">
        <div class="msg-av">☕</div>
        <div class="msg-col">
          <div class="bubble">Xin chào! Mình là trợ lý của <strong>Highlands Coffee</strong> <br><br>Mình có thể giúp bạn tra cứu <strong>giá đồ uống, thành phần, gợi ý món uống</strong> và thông tin cửa hàng. Bạn muốn hỏi gì nào?</div>
          <span class="msg-time">${getTime()}</span>
        </div>
      </div>`;
    showToast('Đã xóa lịch sử chat');
  }

  // ── Auto-resize textarea ──────────────────────────────────
  const inputEl = document.getElementById('user-input');
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 96) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
